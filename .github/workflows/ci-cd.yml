name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: fan-raid-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test backend
        run: pnpm --filter @fan-raid/server run test

      - name: Build packages
        run: pnpm build

      - name: Prepare CI env for Docker Compose
        run: |
          cat > .env <<'ENV'
          FEED_SOURCE=sim
          DEV_MODE=true
          SERVER_PORT=8080
          SESSION_SECRET=ci-secret
          SOLANA_ENABLED=false
          TXODDS_API_KEY=
          ENV

      - name: Build Docker images
        run: docker compose build

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/fan-raids' }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST" || (echo "DEPLOY_HOST secret is missing" && exit 1)
          test -n "$DEPLOY_USER" || (echo "DEPLOY_USER secret is missing" && exit 1)
          test -n "$DEPLOY_SSH_KEY$DEPLOY_PASSWORD" || (echo "Set DEPLOY_SSH_KEY or DEPLOY_PASSWORD secret" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          if [ -n "$DEPLOY_SSH_KEY" ]; then
            printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
          fi
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Install sshpass for password auth
        if: env.DEPLOY_SSH_KEY == '' && env.DEPLOY_PASSWORD != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy over SSH
        run: |
          SSH_TARGET="$DEPLOY_USER@$DEPLOY_HOST"

          if [ -n "$DEPLOY_SSH_KEY" ]; then
            SSH_CMD=(ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT")
            SCP_CMD=(scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT")
          else
            export SSHPASS="$DEPLOY_PASSWORD"
            SSH_CMD=(sshpass -e ssh -p "$DEPLOY_PORT")
            SCP_CMD=(sshpass -e scp -P "$DEPLOY_PORT")
          fi

          tar \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='.pnpm-store' \
            --exclude='dist' \
            --exclude='**/dist' \
            --exclude='*.log' \
            --exclude='*.sqlite' \
            --exclude='*.sqlite-*' \
            -czf fan-raid-release.tgz .

          "${SCP_CMD[@]}" fan-raid-release.tgz "$SSH_TARGET:/tmp/fan-raid-release.tgz"

          "${SSH_CMD[@]}" "$SSH_TARGET" "APP_DIR='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p "$APP_DIR"

          cd "$APP_DIR"
          ENV_BACKUP="$(mktemp)"
          HAD_ENV=0
          if [ -f ".env" ]; then
            cp .env "$ENV_BACKUP"
            HAD_ENV=1
          fi

          find "$APP_DIR" -mindepth 1 -maxdepth 1 \
            ! -name ".env" \
            -exec rm -rf {} +

          tar -xzf /tmp/fan-raid-release.tgz -C "$APP_DIR"
          rm -f /tmp/fan-raid-release.tgz

          if [ "$HAD_ENV" = "1" ]; then
            mv "$ENV_BACKUP" .env
          elif [ ! -f ".env" ]; then
            rm -f "$ENV_BACKUP"
            cp .env.example .env
            echo "Created $APP_DIR/.env from .env.example. Edit it on the server for production secrets."
          else
            rm -f "$ENV_BACKUP"
          fi

          chmod +x scripts/deploy-on-server.sh
          ./scripts/deploy-on-server.sh
          REMOTE
