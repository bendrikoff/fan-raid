services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - .env
    environment:
      NODE_ENV: production
      SERVER_PORT: 8080
      DATA_DIR: /data
      DB_PATH: /data/fan-raid.sqlite
      RECORDINGS_DIR: /data/recordings
      UPLOADS_DIR: /data/uploads/avatars
      SOLANA_KEYPAIR_PATH: /data/solana-keypair.json
    volumes:
      - fan_raid_server_data:/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  fan_raid_server_data:
